name: Build and Release JAR

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: mvn --batch-mode -pl implementation/mod_pivotal_connector_api -am clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: implementation/mod_pivotal_connector_api/target/pivotal_connector_api.jar
          generate_release_notes: true

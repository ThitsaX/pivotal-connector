        completedTimestamp:
          allOf:
          - $ref: "#/components/schemas/DateTime"
          description: Time and date when the conversion was executed.
        conversionState:
          allOf:
          - $ref: "#/components/schemas/TransferState"
          description: The current status of the conversion request.
        extensionList:
          $ref: "#/components/schemas/ExtensionList"
      required:
      - conversionState
      title: FxTransfersIDPutResponse
      type: object
    FxTransfersPostRequest:
      description: The object sent in the POST /fxTransfers request.
      example:
        condition: ""
        counterPartyFsp: ""
        initiatingFsp: ""
        targetAmount: ""
        commitRequestId: ""
        sourceAmount: ""
        expiration: 2016-05-24T08:38:08.699-04:00
        determiningTransferId: ""
      properties:
        commitRequestId:
          allOf:
          - $ref: "#/components/schemas/CorrelationId"
          description: An end-to-end identifier for the confirmation request.
        determiningTransferId:
          allOf:
          - $ref: "#/components/schemas/CorrelationId"
          description: "The transaction ID of the transfer to which this currency\
            \ conversion relates, if the conversion is part of a transfer. If the\
            \ conversion is a bulk currency purchase, this field should be omitted."
        initiatingFsp:
          allOf:
          - $ref: "#/components/schemas/FspId"
          description: Identifier for the FSP who is requesting a currency conversion.
        counterPartyFsp:
          allOf:
          - $ref: "#/components/schemas/FspId"
          description: Identifier for the FXP who is performing the currency conversion.
        sourceAmount:
          allOf:
          - $ref: "#/components/schemas/Money"
          description: The amount being offered for conversion by the requesting FSP.
        targetAmount:
          allOf:
          - $ref: "#/components/schemas/Money"
          description: The amount which the FXP is to credit to the requesting FSP
            in the target currency.
        condition:
          allOf:
          - $ref: "#/components/schemas/IlpCondition"
          description: ILP condition received by the requesting FSP when the quote
            was approved.
        expiration:
          description: "The API data type DateTime is a JSON String in a lexical format\
            \ that is restricted by a regular expression for interoperability reasons.\
            \ The format is according to [ISO 8601](https://www.iso.org/iso-8601-date-and-time-format.html),\
            \ expressed in a combined date, time and time zone format. A more readable\
            \ version of the format is yyyy-MM-ddTHH:mm:ss.SSS[-HH:MM]. Examples are\
            \ \"2016-05-24T08:38:08.699-04:00\", \"2016-05-24T08:38:08.699Z\" (where\
            \ Z indicates Zulu time zone, same as UTC)."
          example: 2016-05-24T08:38:08.699-04:00
          pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\\
            d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)T(?:[01]\\\
            d|2[0-3]):[0-5]\\d:[0-5]\\d(?:(\\.\\d{3}))(?:Z|[+-][01]\\d:[0-5]\\d)$"
          title: DateTime
          type: string
      required:
      - commitRequestId
      - condition
      - counterPartyFsp
      - initiatingFsp
      - sourceAmount
      - targetAmount
      title: FxTransfersPostRequest
      type: object
    GeoCode:
      description: Data model for the complex type GeoCode. Indicates the geographic
        location from where the transaction was initiated.
      example:
        latitude: "+45.4215"
        longitude: "+75.6972"
      properties:
        latitude:
          description: The API data type Latitude is a JSON String in a lexical format
            that is restricted by a regular expression for interoperability reasons.
          example: "+45.4215"
          pattern: "^(\\+|-)?(?:90(?:(?:\\.0{1,6})?)|(?:[0-9]|[1-8][0-9])(?:(?:\\\
            .[0-9]{1,6})?))$"
          title: Latitude
          type: string
        longitude:
          description: The API data type Longitude is a JSON String in a lexical format
            that is restricted by a regular expression for interoperability reasons.
          example: "+75.6972"
          pattern: "^(\\+|-)?(?:180(?:(?:\\.0{1,6})?)|(?:[0-9]|[1-9][0-9]|1[0-7][0-9])(?:(?:\\\
            .[0-9]{1,6})?))$"
          title: Longitude
          type: string
      required:
      - latitude
      - longitude
      title: GeoCode
      type: object
    IlpCondition:
      description: Condition that must be attached to the transfer by the Payer.
      maxLength: 48
      pattern: "^[A-Za-z0-9-_]{43}$"
      title: IlpCondition

      example:
        extensionList:
          extension:
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
        conversionState: ""
        completedTimestamp: ""
        fulfilment: ""
      properties:
        fulfilment:
          allOf:
          - $ref: "#/components/schemas/IlpFulfilment"
          description: The fulfilment of the condition specified for the currency

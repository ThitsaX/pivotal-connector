          - $ref: "#/components/schemas/FxConversion"
          description: The terms of the currency conversion for which a quotation
            is sought.
      required:
      - conversionRequestId
      - conversionTerms
      title: FxQuotesPostRequest
      type: object
    FxRate:
      description: "The FxRate object contains information about a currency conversion\
        \ in the transfer. It can be used by parties to the transfer to exchange information\
        \ with each other about the exchange rate for the transfer, to ensure that\

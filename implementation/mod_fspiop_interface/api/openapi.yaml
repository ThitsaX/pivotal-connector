      type: object
    ExtensionValue:
      description: Extension value.
      maxLength: 128
      minLength: 1
      title: ExtensionValue
      type: string
    FirstName:
      description: First name of the Party (Name Type).
      example: Henrik
      maxLength: 128
      minLength: 1
      pattern: "^(?!\\s*$)[\\p{L}\\p{gc=Mark}\\p{digit}\\p{gc=Connector_Punctuation}\\\
        p{Join_Control} .,''-]{1,128}$"
      title: FirstName
      type: string
    FspId:
      description: FSP identifier.
      maxLength: 32
      minLength: 1
      title: FspId
      type: string
    FxCharge:
      description: An FXP will be able to specify a charge which it proposes to levy
        on the currency conversion operation using a FxCharge object.
      properties:
        chargeType:
          description: A description of the charge which is being levied.
          maxLength: 32
          minLength: 1
          type: string
        sourceAmount:
          allOf:
          - $ref: "#/components/schemas/Money"
          description: "The amount of the charge which is being levied, expressed\
            \ in the source currency."
        targetAmount:
          allOf:
          - $ref: "#/components/schemas/Money"
          description: "The amount of the charge which is being levied, expressed\
            \ in the target currency."
      required:
      - chargeType
      title: FxCharge
      type: object
    FxConversion:
      description: "A DFSP will be able to request a currency conversion, and an FX\
        \ provider will be able to describe its involvement in a proposed transfer,\
        \ using a FxConversion object."
      properties:
        conversionId:
          allOf:
          - $ref: "#/components/schemas/CorrelationId"
          description: An end-to-end identifier for the conversion request.
        determiningTransferId:
          allOf:
          - $ref: "#/components/schemas/CorrelationId"
          description: The transaction ID of the transfer on whose success this currency
            conversion depends.
        initiatingFsp:
          allOf:
          - $ref: "#/components/schemas/FspId"
          description: The id of the participant who is requesting a currency conversion.
        counterPartyFsp:
          allOf:
          - $ref: "#/components/schemas/FspId"
          description: The ID of the FXP performing the conversion.
        amountType:
          allOf:
          - $ref: "#/components/schemas/AmountType"
          description: This is the AmountType for the base transaction - If SEND -
            then any charges levied by the FXP as part of the transaction will be
            deducted by the FXP from the amount shown for the target party in the
            conversion. If RECEIVE - then any charges levied by the FXP as part of
            the transaction will be added by the FXP to the amount shown for the source
            party in the conversion.
        sourceAmount:
          allOf:
          - $ref: "#/components/schemas/FxMoney"
          description: "The amount to be converted, expressed in the source currency."
        targetAmount:
          allOf:
          - $ref: "#/components/schemas/FxMoney"
          description: "The converted amount, expressed in the target currency."
        expiration:
          allOf:
          - $ref: "#/components/schemas/DateTime"
          description: The end of the period for which the currency conversion is
            required to remain valid.
        charges:
          description: "One or more charges which the FXP intends to levy as part\
            \ of the currency conversion, or which the payee DFSP intends to add to\
            \ the amount transferred."
          items:
            $ref: "#/components/schemas/FxCharge"
          maxItems: 16
          minItems: 0
          type: array
        extensionList:
          allOf:
          - $ref: "#/components/schemas/ExtensionList"
          description: The extension list for the currency conversion request.
      required:
      - amountType
      - conversionId
      - counterPartyFsp
      - expiration
      - initiatingFsp
      - sourceAmount
      - targetAmount
      title: FxConversion
      type: object
    FxMoney:
      description: Data model for the complex type FxMoney; This is based on the type
        Money but allows the amount to be optional to support FX quotations.
      properties:
        currency:
          $ref: "#/components/schemas/Currency"
        amount:
          description: "The API data type Amount is a JSON String in a canonical format\
            \ that is restricted by a regular expression for interoperability reasons.\
            \ This pattern does not allow any trailing zeroes at all, but allows an\
            \ amount without a minor currency unit. It also only allows four digits\
            \ in the minor currency unit; a negative value is not allowed. Using more\
            \ than 18 digits in the major currency unit is not allowed."
          example: "123.45"
          pattern: "^([0]|([1-9][0-9]{0,17}))([.][0-9]{0,3}[1-9])?$"
          title: Amount
          type: string
      required:
      - currency
      title: FxMoney
      type: object
    FxQuotesIDPutResponse:
      description: "The object sent in the PUT /fxQuotes/{ID} callback."
      example:
        condition: ""
        conversionTerms: ""

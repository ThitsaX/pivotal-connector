    Date:
      description: "The API data type Date is a JSON String in a lexical format that\
        \ is restricted by a regular expression for interoperability reasons. This\
        \ format, as specified in ISO 8601, contains a date only. A more readable\
        \ version of the format is yyyy-MM-dd. Examples are \"1982-05-23\", \"1987-08-05”\
        ."
      pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\\
        d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)$"
      title: Date
      type: string
    DateOfBirth:
      description: Date of Birth of the Party.
      example: 1966-06-16
      pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\\
        d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)$"
      title: DateofBirth (type Date)
      type: string
    DateTime:
      description: "The API data type DateTime is a JSON String in a lexical format\
        \ that is restricted by a regular expression for interoperability reasons.\
        \ The format is according to [ISO 8601](https://www.iso.org/iso-8601-date-and-time-format.html),\
        \ expressed in a combined date, time and time zone format. A more readable\
        \ version of the format is yyyy-MM-ddTHH:mm:ss.SSS[-HH:MM]. Examples are \"\
        2016-05-24T08:38:08.699-04:00\", \"2016-05-24T08:38:08.699Z\" (where Z indicates\
        \ Zulu time zone, same as UTC)."
      example: 2016-05-24T08:38:08.699-04:00
      pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\\
        d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)T(?:[01]\\\
        d|2[0-3]):[0-5]\\d:[0-5]\\d(?:(\\.\\d{3}))(?:Z|[+-][01]\\d:[0-5]\\d)$"
      title: DateTime
      type: string
    ErrorCode:
      description: "The API data type ErrorCode is a JSON String of four characters,\
        \ consisting of digits only. Negative numbers are not allowed. A leading zero\
        \ is not allowed. Each error code in the API is a four-digit number, for example,\
        \ 1234, where the first number (1 in the example) represents the high-level\
        \ error category, the second number (2 in the example) represents the low-level\
        \ error category, and the last two numbers (34 in the example) represent the\
        \ specific error."
      example: "5100"
      pattern: "^[1-9]\\d{3}$"
      title: ErrorCode
      type: string
    ErrorDescription:
      description: Error description string.
      maxLength: 128
      minLength: 1
      title: ErrorDescription
      type: string
    ErrorInformation:
      description: Data model for the complex type ErrorInformation.
      example:
        errorDescription: errorDescription
        extensionList:
          extension:
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
        errorCode: "5100"
      properties:
        errorCode:
          description: "The API data type ErrorCode is a JSON String of four characters,\
            \ consisting of digits only. Negative numbers are not allowed. A leading\
            \ zero is not allowed. Each error code in the API is a four-digit number,\
            \ for example, 1234, where the first number (1 in the example) represents\
            \ the high-level error category, the second number (2 in the example)\
            \ represents the low-level error category, and the last two numbers (34\

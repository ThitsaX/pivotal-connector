        targetAmount:
          allOf:
          - $ref: "#/components/schemas/Money"
          description: The amount of the transfer in the target currency.
      required:
      - sourceAmount
      - targetAmount
      title: FxRate
      type: object
    FxTransfersIDPatchResponse:
      description: "PATCH /fxTransfers/{ID} object"
      example:
        extensionList:
          extension:
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
          - value: value
            key: key
        conversionState: ""
        completedTimestamp: ""
      properties:
        completedTimestamp:

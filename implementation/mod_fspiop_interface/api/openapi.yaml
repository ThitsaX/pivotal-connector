openapi: 3.0.2
info:
  contact:
    name: Sam Kummary
    url: https://github.com/mojaloop/mojaloop-specification/issues
  description: |-
    Revision date: 2023-11-23 Based on [API Definition updated on 2020-05-19 Version 1.1](https://github.com/mojaloop/mojaloop-specification/blob/main/documents/v1.1-document-set/API%20Definition_v1.1.pdf).
    This is implementation friendly version of the API definition.
    It includes the below definitions needed for third-party functionality. - AuthenticationType
      - U2F enum
    - AuthenticationValue
      - oneOf is changed to anyOf
      - new element is added U2FPinValue
    - New element U2FPIN
    **Note:** The API supports a maximum size of 65536 bytes (64 Kilobytes) in the HTTP header.
  license:
    name: CC BY-ND 4.0
    url: https://github.com/mojaloop/mojaloop-specification/blob/main/LICENSE.md
  title: Open API for FSP Interoperability (FSPIOP)
  version: 2.0-draft
servers:
- url: protocol://hostname:<port>/switch/
  variables:
    protocol:
      default: https
      enum:
      - http
      - https
paths:
  /participants/{Type}/{ID}:
    delete:
      description: |-
        The HTTP request `DELETE /participants/{Type}/{ID}` (or `DELETE /participants/{Type}/{ID}/{SubId}`) is used to delete information in the server regarding the provided identity, defined by `{Type}` and `{ID}`) (for example, `DELETE /participants/MSISDN/123456789`), and optionally `{SubId}`. This HTTP request should support a query string to delete FSP information regarding a specific currency only. To delete a specific currency only, the HTTP request `DELETE /participants/{Type}/{ID}?currency=XYZ` should be used, where `XYZ` is the requested currency.

        **Note:** The Account Lookup System should verify that it is the Party’s current FSP that is deleting the FSP information.
      operationId: ParticipantsByTypeAndID2
      parameters:
      - description: "The type of the party identifier. For example, `MSISDN`, `PERSONAL_ID`."
        explode: false
        in: path
        name: Type
        required: true
        schema:
          type: string
        style: simple
      - description: The identifier value.
        explode: false
        in: path
        name: ID
        required: true
        schema:
          type: string
        style: simple
      - description: The `Content-Type` header indicates the specific version of the
          API used to send the payload body.
        explode: false
        in: header
        name: Content-Type
        required: true
        schema:
          type: string
        style: simple
      - description: The `Date` header field indicates the date when the request was
          sent.
        explode: false
        in: header
        name: Date
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          The `X-Forwarded-For` header field is an unofficially accepted standard used for informational purposes of the originating client IP address, as a request might pass multiple proxies, firewalls, and so on. Multiple `X-Forwarded-For` values should be expected and supported by implementers of the API.

          **Note:** An alternative to `X-Forwarded-For` is defined in [RFC 7239](https://tools.ietf.org/html/rfc7239). However, to this point RFC 7239 is less-used and supported than `X-Forwarded-For`.
        explode: false
        in: header
        name: X-Forwarded-For
        required: false
        schema:
          type: string
        style: simple
      - description: The `FSPIOP-Source` header field is a non-HTTP standard field
          used by the API for identifying the sender of the HTTP request. The field
          should be set by the original sender of the request. Required for routing
          and signature verification (see header field `FSPIOP-Signature`).
        explode: false
        in: header
        name: FSPIOP-Source
        required: true
        schema:
          type: string
        style: simple
      - description: "The `FSPIOP-Destination` header field is a non-HTTP standard\
          \ field used by the API for HTTP header based routing of requests and responses\
          \ to the destination. The field must be set by the original sender of the\
          \ request if the destination is known (valid for all services except GET\
          \ /parties) so that any entities between the client and the server do not\
          \ need to parse the payload for routing purposes. If the destination is\
          \ not known (valid for service GET /parties), the field should be left empty."
        explode: false
        in: header
        name: FSPIOP-Destination
        required: false
        schema:
          type: string
        style: simple
      - description: The `FSPIOP-Encryption` header field is a non-HTTP standard field
          used by the API for applying end-to-end encryption of the request.
        explode: false
        in: header
        name: FSPIOP-Encryption
        required: false
        schema:
          type: string
        style: simple
      - description: The `FSPIOP-Signature` header field is a non-HTTP standard field
          used by the API for applying an end-to-end request signature.
        explode: false
        in: header
        name: FSPIOP-Signature
        required: false
        schema:
          type: string
        style: simple
      - description: "The `FSPIOP-URI` header field is a non-HTTP standard field used\
          \ by the API for signature verification, should contain the service URI.\
          \ Required if signature verification is used, for more information, see\
          \ [the API Signature document](https://github.com/mojaloop/docs/tree/main/Specification%20Document%20Set)."
        explode: false
        in: header
        name: FSPIOP-URI
        required: false
        schema:
          type: string
        style: simple
      - description: "The `FSPIOP-HTTP-Method` header field is a non-HTTP standard\
          \ field used by the API for signature verification, should contain the service\
          \ HTTP method. Required if signature verification is used, for more information,\
          \ see [the API Signature document](https://github.com/mojaloop/docs/tree/main/Specification%20Document%20Set)."
        explode: false
        in: header
        name: FSPIOP-HTTP-Method
        required: false
        schema:
          type: string
        style: simple
      - description: The `Accept` header field indicates the version of the API the
          client would like the server to use.
        explode: false
        in: header
        name: Accept
        required: true
        schema:
          type: string
        style: simple
      responses:

  schemas:
    Amount:
      description: "The API data type Amount is a JSON String in a canonical format\
        \ that is restricted by a regular expression for interoperability reasons.\
        \ This pattern does not allow any trailing zeroes at all, but allows an amount\
        \ without a minor currency unit. It also only allows four digits in the minor\
        \ currency unit; a negative value is not allowed. Using more than 18 digits\
        \ in the major currency unit is not allowed."
      example: "123.45"
      pattern: "^([0]|([1-9][0-9]{0,17}))([.][0-9]{0,3}[1-9])?$"
      title: Amount
      type: string
    AmountType:
      description: |-
        Below are the allowed values for the enumeration AmountType.
        - SEND - Amount the Payer would like to send, that is, the amount that should be withdrawn from the Payer account including any fees.
        - RECEIVE - Amount the Payer would like the Payee to receive, that is, the amount that should be sent to the receiver exclusive of any fees.
      enum:
      - SEND
      - RECEIVE
      example: RECEIVE
      title: AmountType
      type: string
    AuthenticationInfo:
      description: Data model for the complex type AuthenticationInfo.
      example:
        authenticationValue: null
        authentication: OTP
      properties:
        authentication:
          $ref: "#/components/schemas/AuthenticationType"
        authenticationValue:
          $ref: "#/components/schemas/AuthenticationValue"
      required:
      - authentication
      - authenticationValue
      title: AuthenticationInfo
      type: object
    AuthenticationType:
      description: |-
        Below are the allowed values for the enumeration AuthenticationType.
        - OTP - One-time password generated by the Payer FSP.
        - QRCODE - QR code used as One Time Password.
        - U2F - U2F is a new addition isolated to Thirdparty stream.
      enum:
      - OTP
      - QRCODE
      - U2F
      example: OTP
      title: AuthenticationType
      type: string
    AuthenticationValue:
      anyOf:
      - $ref: "#/components/schemas/OtpValue"
      - $ref: "#/components/schemas/QRCODE"
      - $ref: "#/components/schemas/U2FPinValue"
      description: Contains the authentication value. The format depends on the authentication
        type used in the AuthenticationInfo complex type.
      pattern: "^\\d{3,10}$|^\\S{1,64}$"
      title: AuthenticationValue
    AuthorizationResponse:
      description: |-
        Below are the allowed values for the enumeration.
        - ENTERED - Consumer entered the authentication value.
        - REJECTED - Consumer rejected the transaction.
        - RESEND - Consumer requested to resend the authentication value.
      enum:
      - ENTERED
      - REJECTED
      - RESEND
      example: ENTERED
      title: AuthorizationResponse
      type: string
    AuthorizationsIDPutResponse:
      description: "The object sent in the PUT /authorizations/{ID} callback."
      example:
        authenticationInfo:
          authenticationValue: null
          authentication: OTP
        responseType: ENTERED
      properties:
        authenticationInfo:
          $ref: "#/components/schemas/AuthenticationInfo"
        responseType:
          $ref: "#/components/schemas/AuthorizationResponse"
      required:
      - responseType
      title: AuthorizationsIDPutResponse
      type: object
    BalanceOfPayments:
      description: "(BopCode) The API data type [BopCode](https://www.imf.org/external/np/sta/bopcode/)\
        \ is a JSON String of 3 characters, consisting of digits only. Negative numbers\
        \ are not allowed. A leading zero is not allowed."
      example: "123"
      pattern: "^[1-9]\\d{2}$"
      title: BalanceOfPayments
      type: string
    BinaryString:
      description: "The API data type BinaryString is a JSON String. The string is\
        \ a base64url  encoding of a string of raw bytes, where padding (character\
        \ ‘=’) is added at the end of the data if needed to ensure that the string\
        \ is a multiple of 4 characters. The length restriction indicates the allowed\
        \ number of characters."
      pattern: "^[A-Za-z0-9-_]+[=]{0,2}$"
      type: string
    BinaryString32:
      description: "The API data type BinaryString32 is a fixed size version of the\
        \ API data type BinaryString, where the raw underlying data is always of 32\
        \ bytes. The data type BinaryString32 should not use a padding character as\
        \ the size of the underlying data is fixed."
      pattern: "^[A-Za-z0-9-_]{43}$"
      type: string
